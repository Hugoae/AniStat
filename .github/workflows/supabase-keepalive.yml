name: Supabase keep-alive

on:
  schedule:
    # Tous les 3 jours à 09:00 UTC — reset du timer d'inactivité free tier (7 jours).
    - cron: "0 9 */3 * *"
  workflow_dispatch:

permissions:
  contents: read

# Clés publishable Supabase (identiques à VITE_* côté app, protégées par RLS).
env:
  SUPABASE_URL: https://oppaumqkahnadlrlhjnb.supabase.co
  SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9wcGF1bXFrYWhuYWRscmxoam5iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMTM4MDksImV4cCI6MjA5Mjg4OTgwOX0.IrHK3mkvMEWS7-R0Ji16BQI7513DHdENN6TqbFrESdY

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          set -euo pipefail

          url="${SUPABASE_URL%/}/rest/v1/tracked_users?select=anilist_user_id&limit=1"
          http_code=$(curl -sS -o /tmp/supabase-ping.json -w "%{http_code}" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            -H "Accept: application/json" \
            "${url}")

          echo "HTTP ${http_code}"
          cat /tmp/supabase-ping.json

          if [ "${http_code}" -lt 200 ] || [ "${http_code}" -ge 300 ]; then
            echo "::error::Supabase keep-alive failed (HTTP ${http_code})"
            exit 1
          fi

          echo "Supabase keep-alive OK"
